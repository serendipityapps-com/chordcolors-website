name: Deploy content to Cloudflare Pages

# Auto-deploys chordcolors.com on every push to master.
# Today the site is static, so we just strip the internal-only folders and ship
# the files to the chordcolors-web Pages project. When this becomes an Astro
# project, add a Node setup + `yarn install` + `yarn build` before the deploy and
# change the deploy path from "." to the build output (e.g. "dist").
# Needs one repo secret: CLOUDFLARE_API_TOKEN (Cloudflare Pages: Edit).

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Strip internal-only files
        run: rm -rf marketing scripts .claude .vercel .github
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: dddf6e1ca25547618362695749eac254
          command: pages deploy . --project-name=chordcolors-web --branch=main

      # Purge the Cloudflare edge cache so this deploy goes live immediately.
      # HTML is cached aggressively at the edge (see scripts/setup-cloudflare-cache.sh),
      # so without this a release would not appear until the edge TTL expired.
      # Skips gracefully until the CLOUDFLARE_CACHE_TOKEN secret exists
      # (Zone chordcolors.com -> Cache Purge).
      - name: Purge Cloudflare edge cache
        env:
          CF_CACHE_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_TOKEN }}
        run: |
          if [ -z "$CF_CACHE_TOKEN" ]; then
            echo "CLOUDFLARE_CACHE_TOKEN not set; skipping cache purge."
            exit 0
          fi
          resp=$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/fd5d5aa36a799afac2e20ffa025d33f2/purge_cache" \
            -H "Authorization: Bearer $CF_CACHE_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$resp"
          echo "$resp" | grep -q '"success":true' || { echo "Cache purge failed"; exit 1; }
          echo "Cloudflare edge cache purged."
